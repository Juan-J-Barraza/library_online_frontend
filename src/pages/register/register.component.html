<div class="auth-page animate-fade-in">
  <div class="glass-card auth-card register-card">
    <div class="auth-header">
      <span class="auth-icon">📝</span>
      <h2>Crear Cuenta</h2>
      <p>Únete a nuestra biblioteca digital</p>
    </div>

    <form (ngSubmit)="register()" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label for="name">Nombre</label>
          <input id="name" type="text" [(ngModel)]="name" name="name" placeholder="Juan" required>
        </div>
        <div class="form-group">
          <label for="lastName">Apellido</label>
          <input id="lastName" type="text" [(ngModel)]="lastName" name="lastName" placeholder="Pérez" required>
        </div>
      </div>

      <div class="form-group">
        <label for="role">Rol</label>
        <select id="role" [(ngModel)]="role" name="role" required>
          <option value="" disabled selected>Selecciona tu rol</option>
          <option value="ESTUDIANTE">Estudiante</option>
          <option value="PROFESOR">Profesor</option>
          <option value="ADMIN">Administrador</option>
        </select>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="ejemplo@correo.com" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>

      <p class="error-msg" *ngIf="errorMensaje">{{ errorMensaje }}</p>

      <button type="submit" class="primary-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Registrarse</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>
    </form>

    <div class="auth-footer">
      <p>¿Ya tienes una cuenta? <a routerLink="/">Inicia sesión aquí</a></p>
    </div>
  </div>
</div>
